<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>الدفعة 26 | كلية الهندسة</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* حافظ على نفس تنسيقات CSS السابقة الخاصة بك هنا */
    :root {
      --primary-color: #2563eb; --bg-color: #f1f5f9; --sidebar-color: #0f172a;
      --text-color: #1e293b; --accent-color: #3b82f6; --white: #ffffff;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); --border-radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; scroll-behavior: smooth; }
    nav { background: var(--sidebar-color); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
    .logo { color: var(--white); font-weight: bold; font-size: 1.5rem; cursor: pointer; }
    .logo span { color: var(--accent-color); }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a { color: #cbd5e1; text-decoration: none; font-size: 0.95rem; transition: 0.3s; }
    .nav-links a:hover { color: var(--white); border-bottom: 2px solid var(--accent-color); }
    .hero { background: linear-gradient(135deg, #1e40af, var(--primary-color)); color: var(--white); padding: 60px 5%; text-align: center; }
    .hero-bx { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; margin-top: -40px; padding: 0 5%; }
    .bx { background: var(--white); padding: 1.5rem; border-radius: var(--border-radius); text-align: center; box-shadow: var(--shadow); transition: 0.2s; cursor: pointer; flex: 1; min-width: 180px; max-width: 240px; }
    .bx:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1); }
    .Search { padding: 2rem 5%; display: flex; justify-content: center; }
    .Search-bx { display: flex; align-items: center; background: var(--white); border-radius: 60px; box-shadow: var(--shadow); width: 100%; max-width: 550px; overflow: hidden; }
    .Search-bx input { flex: 1; border: none; outline: none; padding: 0.9rem 1.2rem; text-align: right; }
    .Search-bx button { background: var(--primary-color); color: white; width: 50px; height: 50px; border: none; cursor: pointer; }
    .main-section { padding: 2rem 5%; max-width: 1200px; margin: 0 auto; }
    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; border-bottom: 2px solid var(--accent-color); padding-bottom: 0.5rem; }
    .news-item { background: var(--white); padding: 1rem; border-radius: 12px; margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; box-shadow: var(--shadow); }
    .news-date { background: var(--accent-color); color: white; padding: 0.3rem 0.8rem; border-radius: 30px; font-size: 0.8rem; }
    .academic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .subject-card { background: var(--white); padding: 1.2rem; border-radius: 12px; box-shadow: var(--shadow); border-right: 4px solid var(--primary-color); }
    .subject-card a { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text-color); margin: 0.5rem 0; transition: 0.2s; }
    .subject-card a:hover { transform: translateX(-5px); color: var(--primary-color); }
    .table-container { overflow-x: auto; background: var(--white); border-radius: 12px; box-shadow: var(--shadow); }
    table { width: 100%; border-collapse: collapse; text-align: center; }
    th { background: var(--primary-color); color: white; padding: 12px; }
    td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
    footer { text-align: center; padding: 2rem; color: #64748b; border-top: 1px solid #cbd5e1; margin-top: 2rem; }
  </style>
</head>
<body>
  <header>
    <nav>
      <div class="logo" id="mainLogo">الدفعة <span>26</span></div>
      <div class="nav-links">
        <a href="#news">الإعلانات</a>
        <a href="#schedule">الجدول</a>
        <a href="#library">المكتبة</a>
      </div>
    </nav>
  </header>

  <div class="hero">
    <h1>منصة المهندسين | الدفعة 26</h1>
    <p>تحديثات أكاديمية ولحظية</p>
  </div>

  <div class="hero-bx">
    <div class="bx" onclick="location.href='#schedule'"><i class="fas fa-calendar-day fa-2x"></i><h3>الجدول</h3></div>
    <div class="bx" onclick="location.href='#library'"><i class="fas fa-book-open fa-2x"></i><h3>المكتبة</h3></div>
    <div class="bx" onclick="location.href='#news'"><i class="fas fa-bullhorn fa-2x"></i><h3>الإعلانات</h3></div>
  </div>

  <div class="Search">
    <div class="Search-bx">
      <input type="text" id="searchInput" placeholder="ابحث هنا...">
      <button id="searchBtn"><i class="fas fa-search"></i></button>
    </div>
  </div>

  <section id="news" class="main-section">
    <div class="section-header"><h2><i class="fas fa-bullhorn"></i> آخر الإعلانات</h2></div>
    <div id="announcementsContainer"></div>
  </section>

  <section id="schedule" class="main-section">
    <div class="section-header"><h2><i class="fas fa-calendar-alt"></i> الجدول الدراسي</h2></div>
    <div class="table-container"><table><thead><tr><th>اليوم</th><th>8-10</th><th>10-12</th><th>12-2</th></tr></thead><tbody id="scheduleBody"></tbody></table></div>
  </section>

  <section id="library" class="main-section">
    <div class="section-header"><h2><i class="fas fa-folder-open"></i> المكتبة الرقمية</h2></div>
    <div id="libraryContainer" class="academic-grid"></div>
  </section>

  <footer>تم التطوير بواسطة ليدر الدفعة 26 &copy; 2026</footer>

  <script>
    const STORAGE = { ANN: 'batch26_announcements', LIB: 'batch26_library', SCH: 'batch26_schedule' };

    function refreshUI() {
      renderAnn(); renderLib(); renderSch();
    }

    function renderAnn() {
      const data = JSON.parse(localStorage.getItem(STORAGE.ANN) || '[]');
      document.getElementById('announcementsContainer').innerHTML = data.map(a => `
        <div class="news-item"><span class="news-date">${a.date}</span><strong>${a.title}</strong><p>${a.content}</p></div>
      `).join('') || 'لا توجد إعلانات';
    }

    function renderLib() {
      const data = JSON.parse(localStorage.getItem(STORAGE.LIB) || '[]');
      const grouped = {};
      data.forEach(item => { if(!grouped[item.category]) grouped[item.category] = []; grouped[item.category].push(item); });
      document.getElementById('libraryContainer').innerHTML = Object.entries(grouped).map(([cat, items]) => `
        <div class="subject-card"><h4>${cat}</h4>${items.map(i => `<a href="${i.url}" target="_blank"><i class="fas fa-${i.icon}"></i> ${i.title}</a>`).join('')}</div>
      `).join('') || 'المكتبة فارغة حالياً';
    }

    function renderSch() {
      const data = JSON.parse(localStorage.getItem(STORAGE.SCH) || '[]');
      document.getElementById('scheduleBody').innerHTML = data.map(r => `
        <tr><td>${r.day}</td><td>${r.first}</td><td>${r.second}</td><td>${r.third}</td></tr>
      `).join('');
    }

    // مزامنة فورية عند التغيير من لوحة المسؤول
    window.addEventListener('storage', (e) => {
      if (Object.values(STORAGE).includes(e.key)) refreshUI();
    });

    // الدخول للمسؤول (نقر مزدوج على اللوجو)
    document.getElementById('mainLogo').addEventListener('dblclick', () => {
      const pass = prompt('🔐 كلمة المرور:');
      if(pass === 'panda@2025') {
        sessionStorage.setItem('isAdmin', 'true');
        window.location.href = 'admin.html';
      }
    });

    refreshUI();
  </script>
</body>
</html>
