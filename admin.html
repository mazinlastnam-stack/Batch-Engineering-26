<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة القائد | الدفعة 26</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* التنسيقات الأساسية للوحة التحكم */
    :root { --primary: #2563eb; --bg: #f1f5f9; --white: #ffffff; --danger: #ef4444; }
    body { background: var(--bg); font-family: sans-serif; display: flex; }
    .sidebar { width: 260px; background: #0f172a; color: white; min-height: 100vh; padding: 20px; position: fixed; right: 0; }
    .main { margin-right: 260px; padding: 30px; width: 100%; }
    .panel { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
    input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-danger { background: var(--danger); }
    .btn-backup { background: #10b981; margin-left: 10px; }
    .list-item { background: #f8fafc; padding: 10px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
  </style>
</head>
<body>

  <script>
    if (sessionStorage.getItem('isAdmin') !== 'true') {
      alert('غير مسموح بالدخول!');
      window.location.href = 'index.html';
    }
  </script>

  <div class="sidebar">
    <h2>لوحة القائد</h2><br>
    <p onclick="show('ann')" style="cursor:pointer"><i class="fas fa-bullhorn"></i> الإعلانات</p><br>
    <p onclick="show('lib')" style="cursor:pointer"><i class="fas fa-book"></i> المكتبة</p><br>
    <p onclick="show('sch')" style="cursor:pointer"><i class="fas fa-calendar"></i> الجدول</p><br>
    <hr><br>
    <button class="btn-danger" onclick="logout()">تسجيل خروج</button>
  </div>

  <div class="main">
    <h1>الإدارة العامة</h1>
    
    <div class="panel">
      <h3>📥 إدارة البيانات (Backup)</h3>
      <p>احتفظ بنسخة من بياناتك أو استعدها من ملف JSON.</p><br>
      <button class="btn-backup" onclick="exportData()"><i class="fas fa-download"></i> تصدير نسخة احتياطية</button>
      <input type="file" id="importFile" style="display:none" onchange="importData(event)">
      <button class="btn-backup" style="background:#f59e0b" onclick="document.getElementById('importFile').click()"><i class="fas fa-upload"></i> استيراد نسخة</button>
    </div>

    <div id="ann" class="panel section">
      <h3>إضافة إعلان</h3>
      <input type="text" id="annTitle" placeholder="العنوان">
      <textarea id="annContent" placeholder="المحتوى"></textarea>
      <button onclick="addAnn()">نشر</button>
      <div id="annList"></div>
    </div>

    <div id="lib" class="panel section" style="display:none">
      <h3>إضافة للمكتبة</h3>
      <input type="text" id="libCat" placeholder="المادة">
      <input type="text" id="libTitle" placeholder="اسم الملف">
      <input type="text" id="libUrl" placeholder="الرابط">
      <select id="libIcon"><option value="file-pdf">PDF</option><option value="link">رابط</option></select>
      <button onclick="addLib()">إضافة</button>
      <div id="libList"></div>
    </div>

    <div id="sch" class="panel section" style="display:none">
      <h3>تعديل الجدول</h3>
      <table>
        <thead><tr><th>اليوم</th><th>8-10</th><th>10-12</th><th>12-2</th><th>حذف</th></tr></thead>
        <tbody id="schEditBody"></tbody>
      </table><br>
      <button onclick="addSchRow()">إضافة يوم جديد</button>
    </div>
  </div>

  <script>
    const KEYS = { ANN: 'batch26_announcements', LIB: 'batch26_library', SCH: 'batch26_schedule' };

    function show(id) {
      document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
      document.getElementById(id).style.display = 'block';
    }

    // --- وظائف النسخ الاحتياطي ---
    function exportData() {
      const data = {
        announcements: JSON.parse(localStorage.getItem(KEYS.ANN) || '[]'),
        library: JSON.parse(localStorage.getItem(KEYS.LIB) || '[]'),
        schedule: JSON.parse(localStorage.getItem(KEYS.SCH) || '[]')
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `backup_batch26_${new Date().toLocaleDateString()}.json`;
      a.click();
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if(confirm('سيتم استبدال البيانات الحالية بالنسخة المستوردة، استمرار؟')) {
            localStorage.setItem(KEYS.ANN, JSON.stringify(data.announcements || []));
            localStorage.setItem(KEYS.LIB, JSON.stringify(data.library || []));
            localStorage.setItem(KEYS.SCH, JSON.stringify(data.schedule || []));
            alert('تم استيراد البيانات بنجاح!');
            location.reload();
          }
        } catch (err) { alert('خطأ في تنسيق الملف!'); }
      };
      reader.readAsText(file);
    }

    // --- الوظائف الأساسية للإدارة ---
    function addAnn() {
      const list = JSON.parse(localStorage.getItem(KEYS.ANN) || '[]');
      list.unshift({ 
        id: Date.now(), 
        title: document.getElementById('annTitle').value, 
        content: document.getElementById('annContent').value,
        date: new Date().toLocaleDateString('ar-EG')
      });
      localStorage.setItem(KEYS.ANN, JSON.stringify(list));
      renderAnn();
    }

    function renderAnn() {
      const list = JSON.parse(localStorage.getItem(KEYS.ANN) || '[]');
      document.getElementById('annList').innerHTML = list.map(a => `
        <div class="list-item">${a.title} <button class="btn-danger" onclick="del('${KEYS.ANN}', ${a.id})">حذف</button></div>
      `).join('');
    }

    function addLib() {
      const list = JSON.parse(localStorage.getItem(KEYS.LIB) || '[]');
      list.push({
        id: Date.now(),
        category: document.getElementById('libCat').value,
        title: document.getElementById('libTitle').value,
        url: document.getElementById('libUrl').value,
        icon: document.getElementById('libIcon').value
      });
      localStorage.setItem(KEYS.LIB, JSON.stringify(list));
      renderLib();
    }

    function renderLib() {
      const list = JSON.parse(localStorage.getItem(KEYS.LIB) || '[]');
      document.getElementById('libList').innerHTML = list.map(i => `
        <div class="list-item">${i.category} - ${i.title} <button class="btn-danger" onclick="del('${KEYS.LIB}', ${i.id})">حذف</button></div>
      `).join('');
    }

    function renderSch() {
      const list = JSON.parse(localStorage.getItem(KEYS.SCH) || '[]');
      document.getElementById('schEditBody').innerHTML = list.map((r, idx) => `
        <tr>
          <td><input value="${r.day}" onchange="updSch(${idx}, 'day', this.value)"></td>
          <td><input value="${r.first}" onchange="updSch(${idx}, 'first', this.value)"></td>
          <td><input value="${r.second}" onchange="updSch(${idx}, 'second', this.value)"></td>
          <td><input value="${r.third}" onchange="updSch(${idx}, 'third', this.value)"></td>
          <td><button class="btn-danger" onclick="delSch(${idx})">X</button></td>
        </tr>
      `).join('');
    }

    function updSch(idx, field, val) {
      const list = JSON.parse(localStorage.getItem(KEYS.SCH));
      list[idx][field] = val;
      localStorage.setItem(KEYS.SCH, JSON.stringify(list));
    }

    function addSchRow() {
      const list = JSON.parse(localStorage.getItem(KEYS.SCH) || '[]');
      list.push({ day: 'اليوم', first: '-', second: '-', third: '-' });
      localStorage.setItem(KEYS.SCH, JSON.stringify(list));
      renderSch();
    }

    window.del = (key, id) => {
      let list = JSON.parse(localStorage.getItem(key));
      list = list.filter(i => i.id !== id);
      localStorage.setItem(key, JSON.stringify(list));
      key === KEYS.ANN ? renderAnn() : renderLib();
    };

    window.delSch = (idx) => {
      let list = JSON.parse(localStorage.getItem(KEYS.SCH));
      list.splice(idx, 1);
      localStorage.setItem(KEYS.SCH, JSON.stringify(list));
      renderSch();
    };

    function logout() {
      sessionStorage.removeItem('isAdmin');
      window.location.href = 'index.html';
    }

    renderAnn(); renderLib(); renderSch();
  </script>
</body>
</html>
